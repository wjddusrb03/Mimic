# Mimic 설정

spawn:
  # 새 청크 로드 시 미믹 생성 확률 (0.0~1.0)
  chunk-chance: 0.05
  # 구조물 내부 상자 → 미믹 교체 확률
  structure-chance: 0.15
  # 청크당 최대 미믹 수
  max-per-chunk: 2
  # 월드당 최대 미믹 수
  max-per-world: 200
  # 미믹 생성 최소 빛 레벨 (이하)
  max-light-level: 7
  # 플레이어와 최소 거리 (블록)
  min-distance-from-player: 24

level:
  # 거리 기반 레벨 결정 (스폰 지점에서의 거리)
  distance-thresholds:
    lv2: 500
    lv3: 1500
    lv4: 3000

combat:
  # 기습 공격 배율
  ambush-multiplier: 1.5
  # 선제 공격 스턴 시간 (틱)
  preemptive-stun-ticks: 60
  # Lv.3+ 분열 시 미니 미믹 수
  split-count: 2
  # Lv.4+ 재위장 시간 (초, 공격받지 않은 시간)
  re-disguise-seconds: 8

detection:
  # 힌트 파티클 표시 범위 (블록)
  hint-range: 8
  # 감지기 아이템 감지 범위 (블록)
  detector-range: 8
  # 사운드 힌트 범위 (블록)
  sound-hint-range: 3

loot:
  # 미믹 이빨 드롭 수량 (최소~최대)
  tooth-min: 1
  tooth-max: 3
  # 미믹 눈알 드롭 확률
  eye-chance: 0.4
  # 미믹 정수 드롭 확률
  essence-chance: 0.1
  # 미믹 심장 드롭 확률 (Lv.4+)
  heart-chance: 0.03
  # 레벨당 추가 드롭 보너스 배율
  level-bonus: 0.1

experience:
  lv1: 15
  lv2: 30
  lv3: 60
  lv4: 120
  lv5: 300

# 크리에이티브 모드에서 미믹 트리거 여부
trigger-in-creative: false

# 미믹이 비활성화되는 월드
disabled-worlds: []

messages:
  prefix: "§8[§c미믹§8] §7"
